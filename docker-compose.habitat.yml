version: '3.8'

services:
  emqx:
    image: emqx/emqx:5.2.0
    container_name: eclss-emqx
    ports:
      - '1883:1883'
      - '8883:8883'
      - '8083:8083'
      - '8084:8084'
      - '18083:18083'
    environment:
      EMQX_NAME: emqx-eclss
      EMQX_HOST: 127.0.0.1
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-config:/opt/emqx/etc
    networks:
      - eclss-network

  influxdb:
    image: influxdb:2.7
    container_name: eclss-influxdb
    ports:
      - '8086:8086'
    environment:
      INFLUXDB_DB: eclss-telemetry
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin-password
      INFLUXDB_HTTP_AUTH_ENABLED: 'true'
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - eclss-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: eclss-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      MQTT_URL: mqtt://emqx:1883
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: dev-token
      INFLUX_ORG: mars-society-kenya
      INFLUX_BUCKET: eclss-telemetry
      PORT: 5000
    depends_on:
      - emqx
      - influxdb
    volumes:
      - ./src/backend:/app/src
    networks:
      - eclss-network

  prometheus:
    image: prom/prometheus:latest
    container_name: eclss-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - eclss-network

  grafana:
    image: grafana/grafana:latest
    container_name: eclss-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-influxdb-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - eclss-network

networks:
  eclss-network:
    driver: bridge

volumes:
  emqx-data:
  emqx-config:
  influxdb-data:
  prometheus-data:
  grafana-data:
